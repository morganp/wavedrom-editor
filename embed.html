<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wavedrom Editor (embed)</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Embed-mode tweaks: full-bleed, no host chrome */
    html, body { background: var(--bg, #fafaf7); }
    /* Hide the top "brand" tag inside the toolbar — the host owns the title */
    .toolbar .brand { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Plain JS helpers -->
  <script src="wave-render.js"></script>
  <script src="samples.js"></script>

  <!-- Tweak defaults — embed mode hides the panel but defaults are still used -->
  <script>
    window.TWEAK_DEFAULTS = {
      "cw": 40,
      "rowH": 40,
      "snap": 1
    };
  </script>

  <!-- Tweaks shell + JSX modules (same as standalone) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="editor-views.jsx"></script>
  <script type="text/babel" src="editor.jsx"></script>

  <!-- Embed SDK -->
  <script src="embed-boot.js"></script>

  <!-- Wait for Babel to finish, then start the postMessage host.
       Babel-standalone processes <script type="text/babel"> blocks in order
       AFTER DOMContentLoaded. By the time this block runs, editor.jsx is
       already evaluated and WavedromEditor is on window. -->
  <script type="text/babel">
    const root = document.getElementById('root');
    if (window.WavedromEditor) {
      window.WavedromEditor.postMessageHost(root);
    } else {
      console.error('[wavedrom-embed] WavedromEditor SDK missing');
    }
  </script>
</body>
</html>
