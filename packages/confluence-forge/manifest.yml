modules:
  macro:
    - key: wavedrom-macro
      resource: macro-view
      resolver:
        function: resolver
      title: WaveDrom diagram
      description: Embed a WaveDrom timing diagram with a visual editor.
      properties:
        layout: full-width

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: macro-view
    path: built/macro/
  - key: editor-modal
    path: built/editor/

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/6d0e232c-8143-4f59-a4eb-10ab7200c80d

permissions:
  scopes:
    - storage:app
