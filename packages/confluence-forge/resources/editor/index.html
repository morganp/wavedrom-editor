<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WaveDrom · edit</title>
  <link rel="stylesheet" href="bundle/embed.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    :root[data-theme="dark"] {
      --bg:     #1d2125; --panel:  #22272b; --ink:    #c7d1db;
      --ink-2:  #9aa4ae; --ink-3:  #6b7681;
      --line:   #2c333a; --line-2: #2c333a;
      --grid:   #262c33; --grid-major: #2e3640;
      --accent: #579dff; --warn:   #f5cd47;
    }
    .actions {
      position: fixed; bottom: 12px; right: 12px; z-index: 1000;
      display: flex; gap: 8px;
    }
    .actions button {
      padding: 6px 14px; border-radius: 4px; border: 1px solid #ccd0d5;
      background: #fff; cursor: pointer; font: 13px -apple-system, system-ui, sans-serif;
    }
    .actions button.primary { background: #0c66e4; color: #fff; border-color: #0c66e4; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="save" class="primary">Save</button>
  </div>
  <script src="bundle/embed.js"></script>
  <script type="module">
    import { view, invoke } from '@forge/bridge';

    const ctx = await view.getContext();
    document.documentElement.dataset.theme = ctx.themeState?.colorMode || 'light';

    const { uuid, initial } = ctx.extension?.modal?.context || {};
    let latest = initial || '{}';

    WavedromEditor.mount(document.getElementById('root'), {
      initial: latest,
      embedded: true,
      onChange: (_json, jsonText) => { latest = jsonText; },
    });

    document.getElementById('save').addEventListener('click', async () => {
      if (uuid) await invoke('wavedrom-save', { uuid, body: latest });
      view.close();
    });
    document.getElementById('cancel').addEventListener('click', () => view.close());
  </script>
</body>
</html>
