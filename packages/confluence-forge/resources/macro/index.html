<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WaveDrom · view</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; font-family: -apple-system, system-ui, sans-serif; }
    .frame { position: relative; padding: 8px 4px; }
    .preview { width: 100%; }
    .edit-btn {
      position: absolute; top: 6px; right: 6px;
      background: #fff; border: 1px solid #d3d3d8; color: #36383c;
      font-size: 12px; padding: 4px 10px; border-radius: 4px;
      cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08);
      opacity: 0; transition: opacity .15s;
    }
    .frame:hover .edit-btn { opacity: 1; }
    .err {
      color: #b13a3a; font-family: ui-monospace, monospace; font-size: 11px;
      padding: 8px; border: 1px solid #e8c5c5; border-radius: 4px; background: #fdf6f3;
    }
  </style>
</head>
<body>
  <div class="frame">
    <button class="edit-btn" id="edit">✎ Edit</button>
    <div class="preview" id="preview"></div>
  </div>

  <script src="bundle/view.js"></script>
  <script type="module">
    import { view, invoke } from '@forge/bridge';

    const previewEl = document.getElementById('preview');
    const editBtn   = document.getElementById('edit');

    async function getBody() {
      const ctx = await view.getContext();
      return ctx.extension?.config?.body || '{}';
    }

    function render(jsonText) {
      try {
        previewEl.innerHTML = WavedromView.renderDiagram(jsonText);
      } catch (e) {
        previewEl.innerHTML = `<div class="err">Render error: ${e.message}</div>`;
      }
    }

    editBtn.addEventListener('click', async () => {
      const current = await getBody();
      await invoke('openEditorModal', { initial: current });
    });

    render(await getBody());
  </script>
</body>
</html>
